name: Build & Release

on:
  push:
    tags:
      - "v*"  # Triggers on version tags like v1.0.0
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build and release (e.g. v3.0.0)"
        required: true

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write  # Required to create GitHub Releases and upload assets

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-2022
            artifact_name: sync_everdrive-windows
            dist_path: dist/sync_everdrive.exe
          - os: macos-latest
            artifact_name: sync_everdrive-macos
            dist_path: dist/sync_everdrive.app
          - os: ubuntu-latest
            artifact_name: sync_everdrive-linux
            dist_path: dist/sync_everdrive

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build with PyInstaller
        run: |
          if [ "${{ matrix.os }}" = "windows-2022" ]; then
            pyinstaller --noconfirm --onefile --windowed --add-data "assets;assets" --icon assets/icon.ico --collect-all customtkinter sync_everdrive.py
          else
            pyinstaller --noconfirm --onefile --windowed --add-data "assets:assets" --icon assets/icon.png --collect-all customtkinter sync_everdrive.py
          fi
        shell: bash

      - name: Zip artifact (Windows/Linux)
        if: matrix.os != 'macos-latest'
        run: |
          if [ "${{ matrix.os }}" = "windows-2022" ]; then
            powershell -Command "Compress-Archive -Path ${{ matrix.dist_path }} -DestinationPath ${{ matrix.artifact_name }}.zip"
          else
            zip -j ${{ matrix.artifact_name }}.zip ${{ matrix.dist_path }}
          fi
        shell: bash

      - name: Zip artifact (macOS)
        if: matrix.os == 'macos-latest'
        run: zip -r ${{ matrix.artifact_name }}.zip ${{ matrix.dist_path }}

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: ${{ matrix.artifact_name }}.zip
          generate_release_notes: true
