name: Build & Release

on:
  push:
    tags:
      - "v*"  # Triggers on version tags like v1.0.0

permissions:
  contents: write  # Required to create GitHub Releases and upload assets

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-2022
            artifact_name: sync_everdrive-windows
            dist_path: dist/sync_everdrive.exe
            zip_name: sync_everdrive-windows.zip
          - os: macos-latest
            artifact_name: sync_everdrive-macos
            dist_path: dist/sync_everdrive.app
            zip_name: sync_everdrive-macos.zip
          - os: ubuntu-latest
            artifact_name: sync_everdrive-linux
            dist_path: dist/sync_everdrive
            zip_name: sync_everdrive-linux.zip

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build with PyInstaller
        run: |
          pyinstaller --clean --noconfirm sync_everdrive.spec
        shell: bash

      - name: Zip artifact (Windows)
        if: matrix.os == 'windows-2022'
        run: |
          Compress-Archive -Path ${{ matrix.dist_path }} -DestinationPath ${{ matrix.zip_name }}
        shell: pwsh

      - name: Zip artifact (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          zip -j ${{ matrix.zip_name }} ${{ matrix.dist_path }}

      - name: Zip artifact (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          zip -r ${{ matrix.zip_name }} ${{ matrix.dist_path }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.zip_name }}

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Flatten directory structure
        run: |
          mkdir dist-release
          find release-artifacts -name "*.zip" -exec cp {} dist-release/ \;
          ls -la dist-release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist-release/*.zip
          generate_release_notes: true
