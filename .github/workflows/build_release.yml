name: Build & Release

on:
  push:
    tags:
      - "v*"  # Triggers on version tags like v1.0.0

permissions:
  contents: write  # Required to create GitHub Releases and upload assets

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact_name: sync_everdrive-windows
            dist_path: dist/sync_everdrive
          - os: macos-latest
            artifact_name: sync_everdrive-macos
            dist_path: dist/sync_everdrive
          - os: ubuntu-latest
            artifact_name: sync_everdrive-linux
            dist_path: dist/sync_everdrive

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build with PyInstaller
        run: |
          pyinstaller --noconfirm --onedir --windowed --collect-all customtkinter sync_everdrive.py

      - name: Zip artifact (Windows)
        if: matrix.os == 'windows-latest'
        run: Compress-Archive -Path ${{ matrix.dist_path }} -DestinationPath ${{ matrix.artifact_name }}.zip
        shell: pwsh

      - name: Zip artifact (macOS/Linux)
        if: matrix.os != 'windows-latest'
        run: zip -r ${{ matrix.artifact_name }}.zip ${{ matrix.dist_path }}

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.artifact_name }}.zip
          generate_release_notes: true
